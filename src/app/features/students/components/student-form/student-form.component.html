<div class="form-container">
  <h1>{{ isEditMode ? 'Modifier' : 'Nouvel' }} Étudiant</h1>

  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <mat-form-field>
        <mat-label>Classe</mat-label>
        <input matInput formControlName="className" required>
      </mat-form-field>

    <div class="form-row">
      <mat-form-field>
        <mat-label>Prénom</mat-label>
        <input matInput formControlName="firstName" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Nom</mat-label>
        <input matInput formControlName="lastName" required>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field>
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email">
      </mat-form-field>

      <mat-form-field>
        <mat-label>Téléphone</mat-label>
        <input matInput formControlName="phoneNumber">
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field>
        <mat-label>Date d'inscription</mat-label>
        <input matInput [matDatepicker]="enrollPicker" formControlName="registrationDate" required>
        <mat-datepicker-toggle matSuffix [for]="enrollPicker"></mat-datepicker-toggle>
        <mat-datepicker #enrollPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Frais annuels</mat-label>
        <input matInput type="number" formControlName="annualTuitionAmount">
      </mat-form-field>
    </div>

    <h2>Informations Parent</h2>

    <div class="form-row">
      <mat-form-field>
        <mat-label>Nom du parent</mat-label>
        <input matInput formControlName="parentName" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Téléphone parent</mat-label>
        <input matInput formControlName="parentPhone" required>
      </mat-form-field>
    </div>

    <mat-form-field class="full-width">
      <mat-label>Email parent</mat-label>
      <input matInput type="email" formControlName="parentEmail">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Statut</mat-label>
      <mat-select formControlName="status">
        <mat-option value="ACTIVE">Actif</mat-option>
        <mat-option value="INACTIVE">Inactif</mat-option>
        <mat-option value="GRADUATED">Diplômé</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="form-actions">
      <button mat-button type="button" (click)="cancel()">Annuler</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="!studentForm.valid">
        {{ isEditMode ? 'Modifier' : 'Créer' }}
      </button>
    </div>
  </form>
</div>
