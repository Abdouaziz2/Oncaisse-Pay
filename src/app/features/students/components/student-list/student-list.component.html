<div class="student-list-container">
  <div class="header">
    <h1>Gestion des Étudiants</h1>
    <button mat-raised-button color="primary" (click)="addStudent()">
      <mat-icon>add</mat-icon>
      Nouvel Étudiant
    </button>
  </div>

  <mat-form-field class="search-field">
    <mat-label>Rechercher</mat-label>
    <input matInput placeholder="Nom, prénom...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <table mat-table [dataSource]="students" class="students-table">
    <ng-container matColumnDef="firstName">
      <th mat-header-cell *matHeaderCellDef>Prénom</th>
      <td mat-cell *matCellDef="let student">{{student.firstName}}</td>
    </ng-container>

    <ng-container matColumnDef="lastName">
      <th mat-header-cell *matHeaderCellDef>Nom</th>
      <td mat-cell *matCellDef="let student">{{student.lastName}}</td>
    </ng-container>

    <ng-container matColumnDef="classLevel">
      <th mat-header-cell *matHeaderCellDef>Classe</th>
      <td mat-cell *matCellDef="let student">{{student.className}}</td>
    </ng-container>

    <ng-container matColumnDef="parentPhone">
      <th mat-header-cell *matHeaderCellDef>Tél. Parent</th>
      <td mat-cell *matCellDef="let student">{{student.parentPhone}}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Statut</th>
      <td mat-cell *matCellDef="let student">
        <span [class]="'status-badge status-' + student.status.toLowerCase()">
          {{student.status}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let student">
        <button mat-icon-button (click)="viewStudent(student.id!)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button (click)="editStudent(student.id!)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteStudent(student.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageIndex]="pageIndex"
    [pageSizeOptions]="[5, 10, 25, 50]" (page)="onPageChange($event)">
  </mat-paginator>
</div>
